# Build and publish a multi-arch container image to GitHub Container
# Registry (ghcr.io). Follows the pattern documented at
# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
#
# Triggers:
#   - push to main           → publishes :main and :sha-<sha>
#   - tag v*                 → publishes :<version> + :latest
#   - workflow_dispatch      → manual rebuild
#
# No PAT needed — uses the built-in GITHUB_TOKEN with packages:write.

name: Build and Publish Container


on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    # Only rebuild the runtime image when something that affects it
    # changes. Docs-only / paper-only / sibling-workflow-only commits
    # are skipped.
    paths:
      - 'src/**'
      - 'r-package/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Deny-all default: the single build-and-push job below declares
# exactly the scopes it needs (packages/id-token/attestations write);
# any job added later without its own block inherits no privileges.
permissions: {}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write       # required for cosign / SLSA provenance attestations
      attestations: write   # required for build provenance attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          lfs: false
          fetch-depth: 0    # full history so VCS_REF reflects the real revision

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=MORIE
            org.opencontainers.image.licenses=GPL-2.0-only
            org.opencontainers.image.vendor=hadesllm

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile
          # Single-arch (amd64) by default — the proven recipe in the
          # other hadesllm/* repos. ARM64 build under QEMU emulation
          # added 28+ min per run for marginal user benefit.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.json && fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] || '' }}
          provenance: true
          sbom: true

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # GHCR containers default to private even when the source repo is
      # public.  Without this step, every fresh container in the org
      # silently lands as private, and `docker pull` requires a
      # `docker login` for end users — defeating the point of a public
      # release.  We flip visibility = public idempotently on every
      # push so the setting survives any future org-admin changes.
      #
      # Requires the org-level setting at
      # https://github.com/organizations/hadesllm/settings/packages to
      # *allow* public packages first; otherwise the PATCH returns
      # HTTP 422 and we keep going (warning, not fatal).
      - name: Set container visibility = public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER}"
          pkg="${GITHUB_REPOSITORY##*/}"
          echo "Setting ghcr.io/${owner}/${pkg} visibility = public ..."
          if gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${owner}/packages/container/${pkg}/visibility" \
              -f visibility=public 2>/tmp/visibility-err; then
            echo "::notice title=Container visibility::ghcr.io/${owner}/${pkg} is now public."
          else
            err=$(cat /tmp/visibility-err 2>/dev/null || echo "unknown")
            echo "::warning title=Container visibility::Could not flip to public — ${err}"
            echo "If this is the first run, flip the org default at"
            echo "https://github.com/organizations/${owner}/settings/packages first,"
            echo "then re-run this workflow."
          fi
