name: rOpenSci pkgcheck

# Runs rOpenSci's pkgcheck (which internally drives pkgstats + covr +
# goodpractice + rcmdcheck) and uploads the markdown report as an
# artifact. Kept on its own runner because pkgcheck/pkgstats are
# GitHub-only (ropensci-review-tools/*), need universal-ctags as a
# system dep, and pull in a full TinyTeX install for the PDF manual.
# Embedding inside r-cmd-check tripped pak dependency resolution
# (see 3MMM.62 -> 3MMM.64 / 3MMM.65 for the morie equivalent).
#
# The other quality leaves that used to live here (covr, lintr,
# goodpractice) now run as POST-CHECK steps on r-cmd-check's
# ubuntu-release matrix cell, where they share the just-installed
# R library and built package state. This file shrunk to one job
# in 3MMM.65 (2026-05-25); workflow name updated accordingly.

# Triggered via the build.yml orchestrator (workflow_call). Kept
# workflow_dispatch for manual debug.
on:
  workflow_call:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MAKEFLAGS: "-j4"

permissions:
  contents: read

jobs:
  pkgcheck:
    # rOpenSci's own check -- pkgstats + covr + goodpractice + rcmdcheck.
    runs-on: ubuntu-latest
    name: rOpenSci pkgcheck

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: r-lib/actions/setup-pandoc@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # pkgcheck's internal rcmdcheck builds the PDF manual, which
      # needs the inconsolata LaTeX font. Without it pkgcheck reports
      # a spurious "R CMD check found 1 warning" against a package
      # that otherwise has 0 warnings in the dedicated r-cmd-check.yml
      # matrix.
      - uses: r-lib/actions/setup-tinytex@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
      - name: Install inconsolata + helpers for PDF manual build
        run: |
          tlmgr update --self
          tlmgr install inconsolata helvetic times courier ec parskip url upquote

      - name: Install system deps for pkgstats (universal-ctags)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y universal-ctags

      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: |
            any::rcmdcheck
            any::goodpractice
            any::cyclocomp
            ropensci-review-tools/pkgstats
            ropensci-review-tools/pkgcheck

      - name: Run pkgcheck::pkgcheck() + checks_to_markdown()
        env:
          # pkgcheck queries the GitHub GraphQL API for repo metadata.
          # Use the runner's auto-provided token instead of unauthen-
          # ticated requests (which hit the 60-req/hr rate limit
          # instantly).
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'cks <- pkgcheck::pkgcheck("."); md <- pkgcheck::checks_to_markdown(cks); writeLines(md, "pkgcheck.md"); cat(md)'

      - name: Upload pkgcheck markdown
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkgcheck-markdown
          path: r-package/morie/pkgcheck.md
