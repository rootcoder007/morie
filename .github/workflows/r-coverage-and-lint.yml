name: R coverage + lint

# Two small parallel jobs: covr (coverage) + lintr (style).
# Both run in parallel with r-cmd-check matrix, NOT serialized after it.
# Avoids the +40 min sequential cost from 3MMM.65 (reverted in 3MMM.72).
#
# pkgcheck + goodpractice were dropped from automatic CI in 3MMM.72:
#   * Both re-run R CMD check + covr + cyclocomp + lintr internally,
#     duplicating work already done in this DAG. ~1 hour per push each.
#   * They remain available via workflow_dispatch for pre-rOpenSci-
#     submission audits -- just not on every push.

on:
  workflow_call:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MAKEFLAGS: "-j4"

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: covr + codecov upload

    env:
      _R_CHECK_FORCE_SUGGESTS_: false
      R_KEEP_PKG_SOURCE: yes
      # pak resolves Remotes against the GitHub API; without a token
      # anonymous lookups can 404 or hit rate limits, surfacing as
      # "Can't find GitHub repo rootcoder007/rmoriedata". Pass the
      # runner token so pak authenticates.
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Pre-install rmoriebricklayer (transitive via rmoriedata; r-universe)
        run: install.packages("rmoriebricklayer", repos = c("https://rootcoder007.r-universe.dev", "https://cloud.r-project.org"))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: any::covr any::xml2
          needs: coverage

      - name: Run covr
        run: |
          Rscript -e 'cov <- covr::package_coverage(type = "tests", quiet = TRUE); covr::to_cobertura(cov, filename = "coverage.xml"); cat(sprintf("Coverage: %.2f%%\n", covr::percent_coverage(cov)))'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: r-package/morie/coverage.xml
          flags: r-tests
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    name: lintr

    env:
      # pak resolves Remotes (rootcoder007/rmoriedata, synth-inference/synthdid)
      # against the GitHub API; anonymous lookups can 404 or get rate-
      # limited, surfacing as "Can't find GitHub repo". Pass the runner's
      # GITHUB_TOKEN so pak can authenticate and dependably resolve.
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Pre-install rmoriebricklayer (transitive via rmoriedata; r-universe)
        run: install.packages("rmoriebricklayer", repos = c("https://rootcoder007.r-universe.dev", "https://cloud.r-project.org"))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: any::lintr

      - name: Run lintr
        run: |
          Rscript -e 'lintr::lint_package()'

  # goodpractice: only on workflow_dispatch. Re-runs R CMD check
  # internally; ~25 min per run; duplicates the matrix r-cmd-check job.
  # Manually fire from the Actions tab before rOpenSci submission.
  goodpractice:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: goodpractice (manual only)

    env:
      _R_CHECK_FORCE_SUGGESTS_: false

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: r-lib/actions/setup-pandoc@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - name: Pre-install rmoriebricklayer (transitive via rmoriedata; r-universe)
        run: install.packages("rmoriebricklayer", repos = c("https://rootcoder007.r-universe.dev", "https://cloud.r-project.org"))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: any::goodpractice any::rcmdcheck any::covr any::cyclocomp any::lintr

      - name: Run goodpractice
        run: |
          Rscript -e 'g <- goodpractice::gp("."); print(g)'

  # pkgcheck: only on workflow_dispatch. Re-runs covr + cyclocomp +
  # lintr + rcmdcheck internally; ~1 hr per run. Manually fire from
  # the Actions tab before rOpenSci submission.
  pkgcheck:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: rOpenSci pkgcheck (manual only)

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: r-lib/actions/setup-pandoc@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # pkgcheck builds the PDF manual; needs LaTeX.
      - uses: r-lib/actions/setup-tinytex@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
      - name: Install inconsolata + helpers for PDF manual build
        run: |
          tlmgr update --self
          tlmgr install inconsolata helvetic times courier ec parskip url upquote

      - name: Install system deps for pkgstats (universal-ctags)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y universal-ctags

      - name: Pre-install rmoriebricklayer (transitive via rmoriedata; r-universe)
        run: install.packages("rmoriebricklayer", repos = c("https://rootcoder007.r-universe.dev", "https://cloud.r-project.org"))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: |
            any::rcmdcheck
            any::goodpractice
            any::cyclocomp
            ropensci-review-tools/pkgstats
            ropensci-review-tools/pkgcheck

      - name: Run pkgcheck
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e 'cks <- pkgcheck::pkgcheck("."); md <- pkgcheck::checks_to_markdown(cks); writeLines(md, "pkgcheck.md"); cat(md)'

      - name: Upload pkgcheck markdown
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkgcheck-markdown
          path: r-package/morie/pkgcheck.md
