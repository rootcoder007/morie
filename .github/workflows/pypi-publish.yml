name: Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Publishes the morie Python package to PyPI on every tag of the
# form v*.*.* (e.g., v0.1.1, v0.2.0). Uses Trusted Publisher OIDC —
# no API token in GitHub secrets. The PyPI side has a Trusted
# Publisher configured at:
#   https://pypi.org/manage/project/morie/settings/publishing/
# with: Owner=rootcoder007 Repository=morie Workflow=pypi-publish.yml
# Environment=pypi.
#
# Since v0.9.1 morie ships a compiled C++ core (morie._core), so the
# release carries platform wheels: the sdist is built once and the
# wheels are built per-OS by cibuildwheel (config in pyproject.toml's
# [tool.cibuildwheel]). publish-to-pypi merges every artifact and
# uploads them together.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --outdir dist/
          python -m twine check dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false

      - name: Build wheels
        uses: pypa/cibuildwheel@d16cc544083d96996f923fc4b318fee3cb14b34e # v3.4.1

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-to-pypi:
    name: Publish to PyPI
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/morie/
    permissions:
      id-token: write
    steps:
      - name: Download all distribution artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: dist/
          pattern: dist-*
          merge-multiple: true

      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true
          # PEP 740 attestations — generates Sigstore signatures for the
          # uploaded artifacts and lets PyPI verify the project URLs
          # (Homepage / Repository / Issues / Documentation / Changelog),
          # which removes the "Unverified details" banner on the project
          # page once the upload is processed.
          attestations: true
