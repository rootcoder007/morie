name: Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Publishes the morie Python package to PyPI on every tag of the
# form v*.*.* (e.g., v0.1.1, v0.2.0). Uses Trusted Publisher OIDC —
# no API token in GitHub secrets. The PyPI side has a Trusted
# Publisher configured at:
#   https://pypi.org/manage/project/morie/settings/publishing/
# with: Owner=hadesllm Repository=morie Workflow=pypi-publish.yml
# Environment=pypi.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build --sdist --wheel --outdir dist/

      - name: Twine check
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/morie/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          # PEP 740 attestations — generates Sigstore signatures for the
          # uploaded artifacts and lets PyPI verify the project URLs
          # (Homepage / Repository / Issues / Documentation / Changelog),
          # which removes the "Unverified details" banner on the project
          # page once the upload is processed.
          attestations: true
