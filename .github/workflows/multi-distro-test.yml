name: Multi-distro Docker smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Multi-distro smoke test for morie.
#
# This workflow installs morie from source inside nine different
# Linux distros (running as Docker containers on ubuntu-latest
# runners) and runs a lightweight import + version smoke for both the
# Python and R packages.
#
# Purpose: catch distro-specific portability regressions early --
# the compiled C++ core in libmorie/ is linked into both the Python
# extension (_core, nanobind + scikit-build-core + CMake + Ninja) and
# the R package (r-package/morie/src/morie_fast.cpp via Rcpp). Each
# distro has its own libc (glibc vs. musl), package manager,
# default toolchain version, and R/Python build layout, so a "works
# on Debian" build can silently break on Alpine, NixOS, or Gentoo.
#
# Scope is deliberately minimal:
#   * Python smoke: `python -c "import morie; print(morie.__version__)"`
#   * R smoke:      `Rscript -e 'library(morie); cat(packageVersion("morie"))'`
# Full pytest + testthat suites are NOT run here -- the ci.yml and
# r-cmd-check.yml workflows already cover those on Ubuntu / macOS /
# Windows. The goal of this workflow is "does it import?".
#
# Each matrix entry is marked continue-on-error: true so that an
# expected-to-be-finicky distro (Alpine musl, NixOS, Gentoo stage3)
# does not block the overall workflow signal -- the Actions tab can
# still be scanned visually to see which distros are healthy.
#
# Triggers: push to main + workflow_dispatch (manual). The 9-container
# build is heavy (~20-30 min wall clock at parallel), so we do NOT run
# it on every PR -- only on merge to main, plus a manual trigger for
# debugging a specific distro regression.

on:
  push:
    branches: ["main", "release/**"]
    paths:
      - "src/morie/**"
      - "libmorie/**"
      - "r-package/**"
      - "pyproject.toml"
      - "CMakeLists.txt"
      - ".github/workflows/multi-distro-test.yml"
  pull_request:
    branches: ["main", "release/**"]
    paths:
      - "src/morie/**"
      - "libmorie/**"
      - "r-package/**"
      - "pyproject.toml"
      - "CMakeLists.txt"
      - ".github/workflows/multi-distro-test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: multi-distro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (${{ matrix.distro.label }})
    runs-on: ubuntu-latest
    # Each distro is independent; one finicky container should not
    # cancel the others. fail-fast OFF + continue-on-error ON.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        distro:
          # Debian / Ubuntu family -- the reference path (matches the
          # repo-root Dockerfile, which is the known-good build).
          - label: "ubuntu 24.04"
            image: "ubuntu:24.04"
            family: "debian"

          - label: "debian bookworm"
            image: "debian:bookworm"
            family: "debian"

          # Red Hat family.
          - label: "fedora 40"
            image: "fedora:40"
            family: "fedora"

          - label: "rocky linux 9"
            image: "rockylinux:9"
            family: "rhel"

          # SUSE family.
          - label: "openSUSE leap 15.5"
            image: "opensuse/leap:15.5"
            family: "suse"

          # Arch family.
          - label: "arch linux"
            image: "archlinux:latest"
            family: "arch"

          # musl libc -- by far the most likely to expose a portability
          # bug in libmorie's C++ core (glibc-isms, locale assumptions,
          # different default stack size, etc.).
          - label: "alpine 3.19 (musl)"
            image: "alpine:3.19"
            family: "alpine"

          # NixOS -- nothing is on $PATH by default; everything comes
          # via nix-shell / nix-env. Treated as a separate family.
          - label: "nixos"
            image: "nixos/nix:latest"
            family: "nix"

          # Gentoo stage3 -- source-based, emerge is slow; treated as
          # best-effort, expected to be the longest job by wall clock.
          - label: "gentoo stage3"
            image: "gentoo/stage3:latest"
            family: "gentoo"

    container:
      image: ${{ matrix.distro.image }}
      # Run as root inside the container; CI containers are throwaway,
      # and several package managers (apk, dnf, emerge, pacman) need
      # root to install build deps.
      options: --user 0:0

    steps:
      # Bootstrap git BEFORE actions/checkout, because some of these
      # base images (alpine, gentoo stage3, nixos/nix) ship without
      # git and actions/checkout will fall back to a slow REST-API
      # checkout if git is missing.
      - name: Bootstrap git + curl (per-family)
        shell: sh
        run: |
          set -eux
          case "${{ matrix.distro.family }}" in
            debian)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates git curl
              ;;
            fedora|rhel)
              dnf -y install ca-certificates git curl
              ;;
            suse)
              zypper --non-interactive refresh
              zypper --non-interactive install -y ca-certificates git curl
              ;;
            arch)
              pacman -Sy --noconfirm ca-certificates git curl
              ;;
            alpine)
              apk add --no-cache ca-certificates git curl bash
              ;;
            nix)
              # nixos/nix image already has git + curl in the base
              # profile; no-op here.
              true
              ;;
            gentoo)
              # stage3 already has git + curl. Sync portage so any
              # later `emerge` calls have a fresh tree.
              emerge-webrsync || true
              ;;
          esac

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false

      # Install Python (>=3.10) + R + a C/C++ toolchain + CMake + Ninja.
      # Each family has a different package manager and different
      # package names; the case block factors that out.
      - name: Install Python, R, and C/C++ toolchain (per-family)
        shell: bash
        run: |
          set -eux
          case "${{ matrix.distro.family }}" in
            debian)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential gcc g++ cmake ninja-build pkg-config \
                python3 python3-dev python3-pip python3-venv \
                r-base r-base-dev \
                libcurl4-openssl-dev libssl-dev libxml2-dev zlib1g-dev
              ;;
            fedora)
              dnf -y install \
                gcc gcc-c++ make cmake ninja-build pkgconf-pkg-config \
                python3 python3-devel python3-pip \
                R-core R-core-devel \
                libcurl-devel openssl-devel libxml2-devel zlib-devel
              ;;
            rhel)
              # rockylinux:9 -- EPEL gives us R + ninja-build.
              dnf -y install epel-release
              dnf -y install \
                gcc gcc-c++ make cmake ninja-build pkgconf-pkg-config \
                python3 python3-devel python3-pip \
                R-core R-core-devel \
                libcurl-devel openssl-devel libxml2-devel zlib-devel
              ;;
            suse)
              zypper --non-interactive install -y \
                gcc gcc-c++ make cmake ninja pkg-config \
                python311 python311-devel python311-pip \
                R-base R-base-devel \
                libcurl-devel libopenssl-devel libxml2-devel zlib-devel
              # Make `python3` resolve to python3.11 on Leap 15.5.
              ln -sf /usr/bin/python3.11 /usr/local/bin/python3 || true
              ln -sf /usr/bin/pip3.11 /usr/local/bin/pip3 || true
              ;;
            arch)
              pacman -Syu --noconfirm \
                base-devel gcc cmake ninja pkgconf \
                python python-pip \
                r \
                curl openssl libxml2 zlib
              ;;
            alpine)
              # musl libc -- the canary distro. Build flags may need
              # to be more conservative; libmorie's C++ core has been
              # written without glibc-isms but this is the job that
              # confirms it.
              apk add --no-cache \
                build-base gcc g++ cmake ninja samurai pkgconfig \
                python3 python3-dev py3-pip \
                R R-dev \
                curl-dev openssl-dev libxml2-dev zlib-dev linux-headers
              ;;
            nix)
              # NixOS: pull a one-shot dev shell with everything we
              # need. We export PATH so subsequent steps see the
              # tools. nix-env -iA is intentionally chosen over
              # nix-shell because GitHub Actions step boundaries
              # break out of any active nix-shell.
              nix-env -iA \
                nixpkgs.gcc \
                nixpkgs.cmake \
                nixpkgs.ninja \
                nixpkgs.pkg-config \
                nixpkgs.python3 \
                nixpkgs.python3Packages.pip \
                nixpkgs.R \
                nixpkgs.curl \
                nixpkgs.openssl \
                nixpkgs.libxml2 \
                nixpkgs.zlib
              ;;
            gentoo)
              # stage3 already has gcc + make. emerge cmake + ninja +
              # python + R. We accept slow wall clock here; this is
              # the "best-effort" distro.
              emerge --quiet --noreplace \
                dev-build/cmake \
                dev-build/ninja \
                dev-lang/python \
                dev-lang/R \
                dev-vcs/git
              ;;
          esac

          # Show what we ended up with.
          python3 --version
          R --version | head -1
          cmake --version | head -1
          (ninja --version || samu --version) 2>/dev/null || true
          gcc --version | head -1

      - name: Install Python morie from source (smoke build)
        shell: bash
        run: |
          set -eux
          # Some distros mark the system Python as PEP 668
          # externally-managed (e.g. Debian 12+, Ubuntu 24.04, Fedora
          # 40). --break-system-packages is the documented escape
          # hatch for throwaway CI containers; we are NOT a user
          # workstation.
          python3 -m pip install --upgrade --break-system-packages \
            pip setuptools wheel || \
          python3 -m pip install --upgrade pip setuptools wheel

          python3 -m pip install --break-system-packages \
            --prefer-binary . || \
          python3 -m pip install --prefer-binary .

      - name: Python smoke (import + version)
        shell: bash
        run: |
          set -eux
          python3 -c "import morie; print('morie', morie.__version__)"

      - name: Install R deps + morie from source
        shell: bash
        run: |
          set -eux
          # Install morie's R-side CRAN dependencies via the public
          # RStudio Package Manager mirror. RSPM serves binaries on
          # the major Linux distros but falls back to source on the
          # rest -- the source fallback is fine here; we're already
          # building libmorie's C++ from source.
          Rscript -e 'install.packages(c("Rcpp","DBI","RSQLite","survey","testthat","jsonlite"), repos="https://cloud.r-project.org", Ncpus=parallel::detectCores())'
          R CMD INSTALL r-package/morie

      - name: R smoke (library + packageVersion)
        shell: bash
        run: |
          set -eux
          Rscript -e 'library(morie); cat(as.character(packageVersion("morie")), "\n")'
