name: Build click-through installers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Builds the standalone, no-Python-required installers for morie:
#   Windows  -> morie-<ver>-windows-x64-setup.exe   (Inno Setup wizard)
#   macOS    -> morie-<ver>-macos-{arm64,x86_64}.pkg (signed + notarized
#               if secrets set; Apple Silicon + Intel)
#   Linux    -> morie .deb + .rpm, amd64 + arm64    (PyInstaller bundle)
#
# Each wraps a PyInstaller bundle (packaging/pyinstaller/morie.spec), so the
# end user needs no Python, no pip, no winget. A PyInstaller bundle is
# platform-native, so every architecture is built on its own runner.
#
# macOS signing is OPTIONAL. To sign + notarize, add these repo secrets:
#   MORIE_CERT_P12_BASE64   base64 of the Developer ID Application .p12
#   MORIE_CERT_P12_PASSWORD password for that .p12
#   MORIE_SIGN_APP          "Developer ID Application: NAME (TEAMID)"
#   MORIE_SIGN_PKG          "Developer ID Installer: NAME (TEAMID)"
#   MORIE_NOTARY_PROFILE    a notarytool keychain profile name
# Without them, an unsigned .pkg is produced (users right-click -> Open).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v)'
        required: true
        default: '0.7.2'

permissions:
  contents: write

jobs:
  installer:
    name: Installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest      # Apple Silicon (arm64)
          - os: macos-13          # Intel (x86_64)
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MORIE_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "MORIE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Install morie + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Build PyInstaller bundle
        run: pyinstaller packaging/pyinstaller/morie.spec --noconfirm

      # ---- Windows -------------------------------------------------------
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:MORIE_VERSION" packaging\windows\morie.iss
          Rename-Item "dist\installer\morie-setup.exe" "morie-$env:MORIE_VERSION-windows-x64-setup.exe"

      # ---- macOS ---------------------------------------------------------
      - name: Import signing certificate
        if: runner.os == 'macOS' && env.HAS_CERT == 'true'
        env:
          HAS_CERT: ${{ secrets.MORIE_CERT_P12_BASE64 != '' }}
          CERT_B64: ${{ secrets.MORIE_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MORIE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/morie-signing.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$CERT_PW" -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k actions "$KEYCHAIN"

      - name: Build macOS installer
        if: runner.os == 'macOS'
        env:
          MORIE_SIGN_APP: ${{ secrets.MORIE_SIGN_APP }}
          MORIE_SIGN_PKG: ${{ secrets.MORIE_SIGN_PKG }}
          MORIE_NOTARY_PROFILE: ${{ secrets.MORIE_NOTARY_PROFILE }}
        run: |
          bash packaging/macos/build-pkg.sh "$MORIE_VERSION" dist/morie
          mv "dist/installer/morie-$MORIE_VERSION.pkg" \
             "dist/installer/morie-$MORIE_VERSION-macos-$(uname -m).pkg"

      # ---- Linux ---------------------------------------------------------
      - name: Build Linux packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y rpm
          sudo gem install --no-document fpm
          bash packaging/fpm-bundle.sh "$MORIE_VERSION" dist/morie "${{ matrix.arch }}"

      # ---- publish -------------------------------------------------------
      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: morie-installer-${{ matrix.os }}
          path: dist/installer/*

      - name: Attach to the GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/installer/*
          fail_on_unmatched_files: true
