name: CodeQL

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Advanced CodeQL setup. This replaces GitHub's managed "Default
# setup": Default setup ran each language as a separate analysis and
# its PR-summary check raced the (slower) Python analysis, producing
# the recurring, non-blocking "1 configuration not found" warning.
# An advanced workflow runs all three languages as one matrix in a
# single run, so the summary check waits for every language and the
# race -- and the warning -- cannot occur.

# Triggered via the build.yml orchestrator (workflow_call) plus a
# weekly scheduled scan (cron). Manual dispatch retained for
# debugging.
on:
  workflow_call:
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

# A new push to the same ref cancels an in-progress run for the
# superseded commit, so successive pushes don't pile up parallel
# CodeQL runs analysing stale commits.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload analysis results
      contents: read           # checkout
      actions: read            # required for the 'actions' language
      packages: read           # fetch CodeQL query packs
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "c-cpp", "python"]

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # Excludes the ~36k generated src/morie/fn/ primitives from
          # extraction -- the dominant cost of the Python analysis.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: "/language:${{ matrix.language }}"
