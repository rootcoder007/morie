name: R CMD check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Parallel compile for source-installed dependencies (notably duckdb,
  # which has ~50 MB of C++ source and otherwise takes 20-25 min single-
  # threaded). GitHub-hosted runners are 4-vCPU / 16 GB RAM so -j4 fits.
  MAKEFLAGS: "-j4"


# Run R CMD check across the supported OS x R-version matrix. Required
# for CRAN submission readiness; also feeds the r-universe daily build.
#
# The R package source lives at r-package/morie (alongside the
# Python src/ tree at the repo root); the matrix sets the
# working-directory accordingly.

# Triggered only via the build.yml orchestrator (workflow_call).
# Kept workflow_dispatch so this can still be run manually for
# debugging.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: 'release' }
          # Pin Windows runner explicitly (windows-latest auto-redirects to
          # windows-2025-vs2026 by 2026-06-15; pre-pin removes ambiguity).
          - { os: windows-2025,   r: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'devel'   }
          - { os: ubuntu-latest,  r: 'oldrel-1' }

    env:
      _R_CHECK_FORCE_SUGGESTS_: false
      R_KEEP_PKG_SOURCE: yes
      # Whether this cell runs the post-check quality steps (lintr,
      # covr, goodpractice). Only the primary ubuntu-release cell
      # pays that cost; mac/win/devel/oldrel skip them.
      MORIE_RUN_QA: ${{ matrix.config.os == 'ubuntu-latest' && matrix.config.r == 'release' }}

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: r-lib/actions/setup-pandoc@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2

      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # cache-version: 1 -- pak's binary cache persists across runs +
      # leaves IF this key matches. Bump to invalidate (eg on Rcpp
      # toolchain change). Use YAML literal-block (|) for extra-packages
      # so each name is its own line; folded-scalar (>-) collapses to
      # one space-separated string which pak mis-resolves.
      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: |
            any::rcmdcheck
            any::lintr
            any::covr
            any::xml2
            any::goodpractice
            any::cyclocomp
          needs: check

      - uses: r-lib/actions/check-r-package@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          upload-snapshots: true
          # Drop --as-cran (too strict pre-CRAN; we'll re-enable for the
          # CRAN-submission PR). Keep --no-manual since we don't ship
          # vignettes/PDFs in CI.
          args: 'c("--no-manual")'
          error-on: '"error"'

      # --- POST-CHECK QA steps (ubuntu-release only) -----------------
      # These previously ran as separate jobs in r-coverage-and-lint.yml,
      # each spinning up its own VM and re-installing R + every Suggests
      # from scratch. Folded in here so they reuse the just-installed R
      # library and built package state. continue-on-error so a single
      # QA hiccup doesn't fail the whole r-cmd-check leaf.

      - name: Run lintr
        if: env.MORIE_RUN_QA == 'true'
        continue-on-error: true
        run: Rscript -e 'lintr::lint_package()'

      - name: Run covr + cobertura
        if: env.MORIE_RUN_QA == 'true'
        continue-on-error: true
        run: |
          Rscript -e 'cov <- covr::package_coverage(type = "tests", quiet = TRUE); covr::to_cobertura(cov, filename = "coverage.xml"); cat(sprintf("Coverage: %.2f%%\n", covr::percent_coverage(cov)))'

      - name: Upload coverage to Codecov
        if: env.MORIE_RUN_QA == 'true'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: r-package/morie/coverage.xml
          flags: r-tests
          fail_ci_if_error: false

      - name: Run goodpractice
        if: env.MORIE_RUN_QA == 'true'
        continue-on-error: true
        run: Rscript -e 'g <- goodpractice::gp("."); print(g)'

  # Separate Linux-only job that spins up a live PostgreSQL service and
  # exercises the PG branch of the DBI cache layer. The PG testthat
  # block in tests/testthat/test-db-backends.R is gated on
  # MORIE_PG_TEST=true; this job sets that env var so the tests run.
  # The default R-CMD-check matrix above does NOT set MORIE_PG_TEST,
  # so the PG block correctly skips there.
  R-CMD-check-postgres:
    runs-on: ubuntu-latest
    name: ubuntu-latest (release) + postgres-15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      _R_CHECK_FORCE_SUGGESTS_: false
      R_KEEP_PKG_SOURCE: yes
      MORIE_PG_TEST: "true"
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: password
      PGDATABASE: testdb

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: r-lib/actions/setup-pandoc@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2

      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          cache-version: 1
          extra-packages: |
            any::rcmdcheck
            any::RPostgres
            any::duckdb
            any::withr
          needs: check

      - uses: r-lib/actions/check-r-package@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          working-directory: r-package/morie
          upload-snapshots: true
          args: 'c("--no-manual")'
          error-on: '"error"'
