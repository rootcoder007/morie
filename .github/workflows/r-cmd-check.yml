name: R CMD check

# Run R CMD check across the supported OS x R-version matrix. Required
# for CRAN submission readiness; also feeds the r-universe daily build.
#
# The R package source lives at r-package/moirais (alongside the
# Python src/ tree at the repo root); the matrix sets the
# working-directory accordingly.

on:
  push:
    branches: [main]
    paths:
      - 'r-package/moirais/**'
      - '.github/workflows/r-cmd-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'devel'   }
          - { os: ubuntu-latest,  r: 'oldrel-1' }

    env:
      _R_CHECK_FORCE_SUGGESTS_: false
      R_KEEP_PKG_SOURCE: yes

    defaults:
      run:
        working-directory: r-package/moirais

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/moirais
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r-package/moirais
          upload-snapshots: true
          args: 'c("--no-manual", "--as-cran")'
