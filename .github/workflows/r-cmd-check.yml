name: R CMD check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Run R CMD check across the supported OS x R-version matrix. Required
# for CRAN submission readiness; also feeds the r-universe daily build.
#
# The R package source lives at r-package/morie (alongside the
# Python src/ tree at the repo root); the matrix sets the
# working-directory accordingly.

on:
  push:
    branches: [main]
    paths:
      - 'r-package/morie/**'
      - '.github/workflows/r-cmd-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: 'release' }
          - { os: windows-latest, r: 'release' }
          - { os: ubuntu-latest,  r: 'release' }
          - { os: ubuntu-latest,  r: 'devel'   }
          - { os: ubuntu-latest,  r: 'oldrel-1' }

    env:
      _R_CHECK_FORCE_SUGGESTS_: false
      R_KEEP_PKG_SOURCE: yes

    defaults:
      run:
        working-directory: r-package/morie

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: r-lib/actions/setup-pandoc@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2

      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          working-directory: r-package/morie
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          working-directory: r-package/morie
          upload-snapshots: true
          # Drop --as-cran (too strict pre-CRAN; we'll re-enable for the
          # CRAN-submission PR). Keep --no-manual since we don't ship
          # vignettes/PDFs in CI.
          args: 'c("--no-manual")'
          error-on: '"error"'
