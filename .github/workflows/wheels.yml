name: Build wheels

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Verifies the compiled morie wheel (the libmorie / morie._core C++
# core) builds across Linux, macOS, and Windows via cibuildwheel.
# Path-restricted to the C++ / packaging surface -- pure-Python changes
# are covered by ci.yml, so they do not trigger a 12-wheel matrix.

# Triggered only via the build.yml orchestrator (workflow_call).
# Kept workflow_dispatch so this can still be run manually for
# debugging.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false

      - name: Build wheels
        uses: pypa/cibuildwheel@d16cc544083d96996f923fc4b318fee3cb14b34e # v3.4.1

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          if-no-files-found: error
