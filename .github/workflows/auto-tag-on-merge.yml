name: Auto-tag on version bump merge

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# When a PR merges into main with a NEW `version =` value in
# pyproject.toml that doesn't already exist as a tag, automatically
# create + push `v<new-version>` so that the existing tag-triggered
# publish workflows fire WITHOUT requiring a manual `git tag` step.
#
# The publish chain this enables:
#   PR merged → pyproject.toml version bumped → THIS workflow
#     → git tag vX.Y.Z + push
#       → pypi-publish.yml fires (Trusted Publisher OIDC -> PyPI)
#       → docker-publish.yml fires (ghcr.io/hadesllm/morie:X.Y.Z + :latest)
#       → release-debrpm.yml fires (DEB + RPM signed)
#       → homebrew-bump.yml fires (updates the hadesllm/homebrew-morie tap)
#       → r-universe polls main + sees new tag (within ~1 hr)
#
# Manual override:
#   - Skip via `[skip auto-tag]` in the merge commit message
#   - Force re-tag via workflow_dispatch with the desired version

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (e.g. 0.4.0) — leave blank to read from pyproject.toml"
        required: false

permissions:
  contents: write   # needed to push tags
  actions: write    # needed to dispatch the publish workflows (chain-fire)

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tag list)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if "[skip auto-tag]" in commit
        run: |
          msg="$(git log -1 --pretty=%B)"
          if echo "$msg" | grep -qF "[skip auto-tag]"; then
            echo "Skip marker found; bailing."
            exit 0
          fi

      - name: Read version from pyproject.toml
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v=$(awk -F'"' '/^version *=/{print $2; exit}' pyproject.toml)
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Detected version: $v"

      - name: Bail if tag exists
        id: gate
        run: |
          v="${{ steps.ver.outputs.version }}"
          if git rev-parse "v$v" >/dev/null 2>&1; then
            echo "Tag v$v already exists; nothing to do."
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.gate.outputs.tag_exists == 'false'
        run: |
          git config user.name  "morie-release-bot[hadesllm]"
          git config user.email "278967282+rootcoder007@users.noreply.github.com"

      - name: Create + push tag
        if: steps.gate.outputs.tag_exists == 'false'
        run: |
          v="${{ steps.ver.outputs.version }}"
          git tag -a "v$v" -m "morie v$v (auto-tagged on pyproject.toml bump)"
          git push origin "v$v"
          echo "::notice title=Auto-tagged::v$v pushed to origin."

      # GitHub's documented limitation: tags pushed by GITHUB_TOKEN do
      # NOT trigger downstream `on: push: tags:` workflows.  Without
      # this chain-fire step, every auto-tagged release would require
      # a manual `gh workflow run pypi-publish.yml --ref vX.Y.Z` to
      # actually ship to PyPI.  Solution: explicitly invoke the tag-
      # triggered workflows via workflow_dispatch using the same
      # GITHUB_TOKEN — workflow_dispatch IS allowed to be fired by
      # the default token, only push events are filtered.
      - name: Chain-fire publish workflows on the new tag
        if: steps.gate.outputs.tag_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ steps.ver.outputs.version }}"
          # pypi-publish: no inputs
          if [ -f ".github/workflows/pypi-publish.yml" ]; then
            echo "Triggering pypi-publish.yml on ref v$v..."
            gh workflow run pypi-publish.yml --ref "v$v" || \
              echo "::warning::pypi-publish could not be dispatched"
          fi
          # release-debrpm: takes a `version` input (without leading v)
          if [ -f ".github/workflows/release-debrpm.yml" ]; then
            echo "Triggering release-debrpm.yml on ref v$v with version=$v..."
            gh workflow run release-debrpm.yml --ref "v$v" -f version="$v" || \
              echo "::warning::release-debrpm could not be dispatched"
          fi
          # docker-publish: the push-to-main run only tags :latest / :main /
          # :sha-* -- the {{version}} semver tag (:X.Y.Z) is produced only on
          # a tag ref, so dispatch it explicitly on v$v. The registry dedupes
          # layers by digest, so this is not a wasteful rebuild.
          if [ -f ".github/workflows/docker-publish.yml" ]; then
            echo "Triggering docker-publish.yml on ref v$v..."
            gh workflow run docker-publish.yml --ref "v$v" || \
              echo "::warning::docker-publish could not be dispatched"
          fi
          # homebrew-bump: update the external Homebrew tap formula.
          if [ -f ".github/workflows/homebrew-bump.yml" ]; then
            echo "Triggering homebrew-bump.yml on ref v$v with version=$v..."
            gh workflow run homebrew-bump.yml --ref "v$v" -f version="$v" || \
              echo "::warning::homebrew-bump could not be dispatched"
          fi
          echo "::notice title=Publish chain::pypi-publish + release-debrpm + docker-publish + homebrew-bump dispatched on v$v."
