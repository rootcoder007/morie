name: Verify and auto-tag release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# When a PR merges into main with a NEW `version =` in pyproject.toml,
# this workflow first VERIFIES that the full release builds -- the
# sdist and the Docker image -- and only then creates the `v<version>`
# tag that fires the publish workflows.
#
# Atomic guarantee: the `tag` job needs the `verify` job, so if any
# build fails, no tag is created and nothing is published. A
# half-broken release (e.g. a Docker image that fails to build, as in
# v0.9.1 / v0.9.2) can no longer ship.
#
#   PR merged -> version bumped -> check -> verify (sdist + Docker
#   image build, no publish) -> tag -> publish chain (pypi / docker /
#   debrpm / homebrew).
#
# Manual override: put [skip auto-tag] in the merge commit, or use
# workflow_dispatch with an explicit version.

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (leave blank to read pyproject.toml)"
        required: false

permissions:
  contents: read

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.gate.outputs.should_release }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout (full history for tag list)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Read version + decide whether to release
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v=$(awk -F'"' '/^version *=/{print $2; exit}' pyproject.toml)
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Detected version: $v"

      - name: Gate (skip marker / existing tag)
        id: gate
        run: |
          v="${{ steps.ver.outputs.version }}"
          if git log -1 --pretty=%B | grep -qF "[skip auto-tag]"; then
            echo "Skip marker found."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "v$v" >/dev/null 2>&1; then
            echo "Tag v$v already exists."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$v is new -- will verify then release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify release build
    needs: check
    if: needs.check.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Verify sdist builds
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist --outdir dist/
          python -m twine check dist/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # Builds every Dockerfile stage (py-builder, r-builder, runtime)
      # without pushing. This is the gate that v0.9.1 / v0.9.2 lacked:
      # a broken Dockerfile fails HERE, before any tag is created.
      # cache-to populates the gha cache so docker-publish's later
      # push-build reuses the layers.
      - name: Verify Docker image builds (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Gate: run the full R test suite before tagging. A prior release shipped a
  # DoubleML segfault because the auto-tag only verified the sdist + Docker
  # build, not the tests. This mirrors ci.yml's test-r job so a failing or
  # segfaulting test now blocks the tag (and therefore the entire publish chain).
  test:
    name: Verify tests pass (gates the tag)
    needs: check
    if: needs.check.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          r-version: "4.6.1"
          use-public-rspm: true
      - name: Pre-install rmoriebricklayer (transitive via rmoriedata; r-universe)
        run: install.packages("rmoriebricklayer", repos = c("https://rootcoder007.r-universe.dev", "https://cloud.r-project.org"))
        shell: Rscript {0}
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2
        with:
          working-directory: r-package/morie
          extra-packages: any::testthat any::survey any::DBI any::RSQLite any::jsonlite
          needs: check
      - name: Reinstall rmoriebricklayer (overwrite any cache-restored 0.2.0)
        run: install.packages("rmoriebricklayer", repos = "https://rootcoder007.r-universe.dev")
        shell: Rscript {0}
      - name: Install morie
        run: R CMD INSTALL r-package/morie
      - name: Run the R test suite (the gate the auto-tag previously lacked)
        run: Rscript -e "library(morie); testthat::test_dir('r-package/morie/tests/testthat')"

  tag:
    name: Tag + fire publish chain
    needs: [check, verify, test]
    if: needs.check.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the tag
      actions: write    # dispatch the publish workflows
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "morie-release-bot[rootcoder007]"
          git config user.email "278967282+rootcoder007@users.noreply.github.com"

      - name: Create + push tag
        run: |
          v="${{ needs.check.outputs.version }}"
          git tag -a "v$v" -m "morie v$v (auto-tagged after release verification)"
          git push origin "v$v"
          echo "::notice title=Auto-tagged::v$v pushed after a clean verify build."

      # Create the GitHub Release object so the Releases page and the
      # "Latest release" badge stay current. Notes are this version's
      # section of the R package NEWS.md; if that section is missing,
      # fall back to GitHub's auto-generated PR notes.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ needs.check.outputs.version }}"
          notes="$(awk -v ver="$v" '
            index($0, "# morie " ver " ") == 1 { p = 1; next }
            p && index($0, "# morie ") == 1   { p = 0 }
            p { print }
          ' r-package/morie/NEWS.md)"
          if [ -n "$(printf "%s" "$notes" | tr -d "[:space:]")" ]; then
            gh release create "v$v" --verify-tag --latest \
              --title "morie v$v" --notes "$notes"
          else
            gh release create "v$v" --verify-tag --latest \
              --title "morie v$v" --generate-notes
          fi
          echo "::notice title=GitHub Release::v$v release object created."

      # Tags pushed by GITHUB_TOKEN do not trigger `on: push: tags:`,
      # so the publish workflows are dispatched explicitly. They run
      # only because `verify` already proved the build is sound.
      - name: Chain-fire publish workflows on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ needs.check.outputs.version }}"
          gh workflow run pypi-publish.yml   --ref "v$v"                || echo "::warning::pypi-publish dispatch failed"
          gh workflow run release-debrpm.yml --ref "v$v" -f version="$v" || echo "::warning::release-debrpm dispatch failed"
          gh workflow run docker-publish.yml --ref "v$v"                || echo "::warning::docker-publish dispatch failed"
          gh workflow run homebrew-bump.yml  --ref "v$v" -f version="$v" || echo "::warning::homebrew-bump dispatch failed"
          echo "::notice title=Publish chain::dispatched on v$v after verification."
