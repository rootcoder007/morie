name: Publish apt / dnf repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Publishes the apt/dnf repository at hadesllm.github.io/morie-repo.
#
# The packages served here are the SAME standalone PyInstaller bundle
# packages built by installers.yml (via packaging/fpm-bundle.sh): an
# embedded Python interpreter, no system Python and no network needed at
# install time. So `apt install morie` / `dnf install morie` are
# byte-identical to the .deb/.rpm attached to each GitHub Release -- one
# `morie` package, two delivery channels, no conflict.
#
# A PyInstaller bundle is platform-native and cannot be cross-built, so
# amd64 and arm64 are each built on their own native runner.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without leading v)'
        required: true
        default: '0.7.2'

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------------
  # build: PyInstaller bundle -> signed .deb + .rpm (amd64 + arm64)
  # ----------------------------------------------------------------------
  build:
    name: Build bundle .deb + .rpm (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install morie + PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Build PyInstaller bundle
        run: pyinstaller packaging/pyinstaller/morie.spec --noconfirm

      - name: Install fpm + rpm tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ruby ruby-dev build-essential rpm dpkg-sig gnupg
          sudo gem install --no-document fpm

      - name: Build bundle .deb + .rpm
        run: bash packaging/fpm-bundle.sh "${{ steps.ver.outputs.VERSION }}" dist/morie "${{ matrix.arch }}"

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --reload gpg-agent
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          KEYUID=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid:/ {print $10; exit}')
          echo "GPG_KEYID=${KEYID}" >> "$GITHUB_ENV"
          echo "GPG_KEYUID=${KEYUID}" >> "$GITHUB_ENV"

      - name: Sign .deb with dpkg-sig
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for deb in dist/installer/*.deb; do
            echo "Signing ${deb} with key ${GPG_KEYID}"
            dpkg-sig -k "${GPG_KEYID}" \
              -g "--batch --pinentry-mode loopback --passphrase ${GPG_PASSPHRASE}" \
              --sign builder "${deb}"
            dpkg-sig --verify "${deb}"
          done

      - name: Configure ~/.rpmmacros for non-interactive sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cat > ~/.rpmmacros <<EOF
          %_signature gpg
          %_gpg_name ${GPG_KEYUID}
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-armor --pinentry-mode loopback \\
              --passphrase ${GPG_PASSPHRASE} --no-secmem-warning \\
              -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF

      - name: Sign .rpm with rpmsign
        run: |
          for rpm in dist/installer/*.rpm; do
            echo "Signing ${rpm}"
            rpmsign --addsign "${rpm}"
            rpm --checksig "${rpm}" || true
          done

      - name: Upload bundle packages
        uses: actions/upload-artifact@v4
        with:
          name: morie-bundle-packages-${{ matrix.arch }}
          path: dist/installer/*
          if-no-files-found: error
          retention-days: 14

  # ----------------------------------------------------------------------
  # publish-repo: assemble apt + dnf repo, push to morie-repo branch
  # ----------------------------------------------------------------------
  publish-repo:
    name: Publish apt/dnf repo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install repo tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev apt-utils createrepo-c gnupg

      - name: Download bundle packages
        uses: actions/download-artifact@v4
        with:
          pattern: morie-bundle-packages-*
          merge-multiple: true
          path: artifacts/

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --reload gpg-agent
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          echo "GPG_KEYID=${KEYID}" >> "$GITHUB_ENV"

      - name: Assemble apt repo (dists/stable/main/binary-*)
        run: |
          REPO=public/apt
          mkdir -p "${REPO}/pool/main"
          cp artifacts/*.deb "${REPO}/pool/main/"
          for arch in amd64 arm64; do
            BIN="${REPO}/dists/stable/main/binary-${arch}"
            mkdir -p "${BIN}"
            ( cd "${REPO}" && \
              dpkg-scanpackages --arch "${arch}" pool/main /dev/null \
                > "dists/stable/main/binary-${arch}/Packages" )
            gzip -kf "${BIN}/Packages"
          done

      - name: Generate apt Release + sign
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          REPO=public/apt
          cat > "${REPO}/dists/stable/Release" <<EOF
          Origin: hadesllm
          Label: morie
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: morie apt repository
          Date: $(date -Ru)
          EOF
          ( cd "${REPO}/dists/stable" && \
            apt-ftparchive release . >> Release.tmp && \
            cat Release Release.tmp > Release.new && mv Release.new Release && rm -f Release.tmp )
          gpg --batch --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
              --default-key "${GPG_KEYID}" \
              --detach-sign --armor -o "${REPO}/dists/stable/Release.gpg" \
              "${REPO}/dists/stable/Release"
          gpg --batch --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
              --default-key "${GPG_KEYID}" \
              --clearsign -o "${REPO}/dists/stable/InRelease" \
              "${REPO}/dists/stable/Release"

      - name: Assemble dnf repo + repomd.xml
        run: |
          REPO=public/rpm
          mkdir -p "${REPO}/packages"
          cp artifacts/*.rpm "${REPO}/packages/"
          createrepo_c "${REPO}"
          cat > "${REPO}/morie.repo" <<'EOF'
          [morie]
          name=morie (hadesllm)
          baseurl=https://hadesllm.github.io/morie-repo/rpm
          enabled=1
          gpgcheck=1
          gpgkey=https://hadesllm.github.io/morie-repo/key.gpg
          EOF

      - name: Sign repomd.xml
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
              --default-key "${GPG_KEYID}" \
              --detach-sign --armor \
              -o public/rpm/repodata/repomd.xml.asc \
              public/rpm/repodata/repomd.xml

      - name: Export public key + index page
        run: |
          gpg --armor --export "${GPG_KEYID}" > public/key.gpg
          cat > public/index.html <<'EOF'
          <!doctype html><meta charset="utf-8">
          <title>morie-repo</title>
          <h1>morie apt / dnf repository</h1>
          <p>See <a href="https://github.com/hadesllm/morie/blob/main/packaging/README.md">install instructions</a>.</p>
          <ul>
            <li><a href="apt/">apt/</a> &mdash; Debian / Ubuntu</li>
            <li><a href="rpm/">rpm/</a> &mdash; Fedora / RHEL</li>
            <li><a href="key.gpg">key.gpg</a> &mdash; signing key</li>
          </ul>
          EOF

      - name: Deploy to morie-repo branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: morie-repo
          force_orphan: false
          keep_files: true
          commit_message: "Publish apt/dnf repo for v${{ steps.ver.outputs.VERSION }}"
