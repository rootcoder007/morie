name: Deploy Sphinx docs to Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Builds the Sphinx documentation in docs/source/ and deploys to
# GitHub Pages. The published site is at:
#   https://hadesllm.github.io/morie/
#
# Uses the official actions/deploy-pages workflow pattern; no
# branch (gh-pages) needed — artefact is uploaded directly.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/morie/**'
      - 'pyproject.toml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + docs extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      # Cache Sphinx's incremental doctrees so unchanged pages skip
      # re-parsing on the next run. Key on docs/source + src/morie
      # + the R man pages — anything that affects the rendered HTML.
      - name: Cache Sphinx doctrees
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .sphinx-doctrees
          key: sphinx-doctrees-${{ hashFiles('docs/source/**', 'src/morie/**', 'r-package/morie/man/**') }}
          restore-keys: |
            sphinx-doctrees-

      - name: Build documentation
        env:
          SKIP_ROXYGEN: "1"   # CI runner has no R/devtools; bypass r_autodoc subprocess
        run: |
          # Serial build — Sphinx -j auto hits a known parallel-pool
          # teardown race (KeyError in sphinx/util/parallel.py) on
          # Linux Py3.12. Serial is ~30s slower but reliably exits 0.
          sphinx-build -b html -d .sphinx-doctrees docs/source docs/build/html
          touch docs/build/html/.nojekyll

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
