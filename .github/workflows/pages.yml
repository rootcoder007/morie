name: Deploy Sphinx docs to Pages

# Builds the Sphinx documentation in docs/source/ and deploys to
# GitHub Pages. The published site is at:
#   https://hadesllm.github.io/moirais/
#
# Uses the official actions/deploy-pages workflow pattern; no
# branch (gh-pages) needed — artefact is uploaded directly.

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/moirais/**'
      - 'pyproject.toml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + docs extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      # Cache Sphinx's incremental doctrees so unchanged pages skip
      # re-parsing on the next run. Key on docs/source + src/moirais
      # + the R man pages — anything that affects the rendered HTML.
      - name: Cache Sphinx doctrees
        uses: actions/cache@v4
        with:
          path: .sphinx-doctrees
          key: sphinx-doctrees-${{ hashFiles('docs/source/**', 'src/moirais/**', 'r-package/moirais/man/**') }}
          restore-keys: |
            sphinx-doctrees-

      - name: Build documentation
        env:
          SKIP_ROXYGEN: "1"   # CI runner has no R/devtools; bypass r_autodoc subprocess
        run: |
          sphinx-build -b html -j auto -d .sphinx-doctrees docs/source docs/build/html
          touch docs/build/html/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
