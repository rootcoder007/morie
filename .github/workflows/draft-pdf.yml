name: Draft JOSS paper PDF

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Render paper.md to PDF when manually invoked. Previously fired on
# every push/PR touching paper.md / paper.bib / this workflow file --
# but JOSS submission isn't planned, so disabled auto-triggers
# (3MMM.63, 2026-05-25). Re-enable the push/pull_request blocks if
# JOSS submission is ever resumed.

on:
  workflow_dispatch:

# Least-privilege: checkout + build the PDF + upload a run-scoped
# artifact. Artifact upload does not need write scopes.
permissions:
  contents: read

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Render JOSS paper preview
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@85a18372e48f551d8af9ddb7a747de685fbbb01c # master
        with:
          journal: joss
          paper-path: paper.md

      - name: Upload PDF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: joss-paper-pdf
          path: paper.pdf
          if-no-files-found: error
