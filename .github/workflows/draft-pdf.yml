name: Draft JOSS paper PDF

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Render paper.md (the JOSS submission) to PDF on
# every push that touches the paper or its bibliography. The rendered
# PDF is uploaded as a workflow artifact so we can preview the JOSS
# layout before submitting.

on:
  push:
    paths:
      - 'paper.md'
      - 'paper.bib'
      - '.github/workflows/draft-pdf.yml'
  pull_request:
    paths:
      - 'paper.md'
      - 'paper.bib'
  workflow_dispatch:

# Least-privilege: checkout + build the PDF + upload a run-scoped
# artifact. Artifact upload does not need write scopes.
permissions:
  contents: read

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Render JOSS paper preview
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@85a18372e48f551d8af9ddb7a747de685fbbb01c # master
        with:
          journal: joss
          paper-path: paper.md

      - name: Upload PDF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: joss-paper-pdf
          path: paper.pdf
          if-no-files-found: error
