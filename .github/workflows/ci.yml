name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


# Triggers only on push to main (admin-merge already short-circuits PR review).
# Path-restricted so docs-only / paper-only / sibling-workflow-only commits
# don't fire a 5-10 min Python+R test cycle.

on:
  push:
    branches: ["main"]
    paths:
      - "src/morie/**"
      - "tests/**"
      - "r-package/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# Least-privilege: every job here only checks out the repo and runs
# the test suites -- no artifact publishing, no releases, no comments.
permissions:
  contents: read

jobs:
  test-python:
    name: Py ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Linux runs widest (oldest + latest Py for backward + forward
        # compat).  macOS + Windows run on latest stable Py only — they
        # catch platform-specific bugs (path separators, line endings,
        # BLAS / numpy wheel availability) without exploding compute.
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system build deps (Linux only, cached)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # v1
        with:
          packages: gfortran libopenblas-dev pkg-config
          version: 1.0

      - name: Install
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -e ".[test,interactive]"

      - name: Test
        run: pytest -q --tb=short

      # User-facing smoke — the exact commands documented in README +
      # TUTORIAL.md.  If a refactor breaks the copy-paste user path,
      # the CLI invocations fail before any pytest does.
      - name: Smoke (fresh-user CLI path)
        run: |
          python -c "import morie; print('morie', morie.__version__)"
          morie list-modules
          morie cheatsheet
          morie explain power_summary.csv
          morie pull tps-layers
          morie run-module power-design --output-dir morie-ci-smoke/
          python -c "import os, sys; sys.exit(0 if os.path.exists('morie-ci-smoke/power_summary.csv') else 1)"
        shell: bash

  test-papers-latex:
    name: LaTeX compile (5 papers)
    runs-on: ubuntu-latest
    # Only run the LaTeX job when papers actually change — typical CI
    # runs skip this 90% of the time.
    if: |
      contains(github.event.head_commit.modified || '', 'papers/') ||
      contains(github.event.head_commit.added || '', 'papers/') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install xelatex + bibtex
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            texlive-publishers texlive-bibtex-extra biber lmodern
      - name: Compile each paper
        run: |
          set -e
          for paper in papers/hawkes-paper papers/morie-empirical-paper \
                       papers/morie-py-paper papers/morie-r-paper \
                       papers/mrm-formulations-paper; do
            echo "=== $paper ==="
            cd "$GITHUB_WORKSPACE/$paper"
            cp ../jss.cls .
            cp ../jss.bst .
            # Two xelatex + bibtex passes to resolve refs
            xelatex -interaction=nonstopmode main.tex || true
            bibtex main || true
            xelatex -interaction=nonstopmode main.tex || true
            xelatex -interaction=nonstopmode main.tex
            test -f main.pdf || { echo "FAIL: no PDF produced for $paper"; exit 1; }
            ls -la main.pdf
            cd "$GITHUB_WORKSPACE"
          done

  test-r:
    name: R tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: false

      - uses: r-lib/actions/setup-r@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          r-version: "release"
          use-public-rspm: true

      # setup-r-dependencies@v2 installs DESCRIPTION's Imports/Suggests
      # AND any extra-packages list, into the right user library so
      # later library() / Rscript calls find them.
      - uses: r-lib/actions/setup-r-dependencies@a51a8012b0aab7c32ef9d19bf54da93f3254335e # v2
        with:
          working-directory: r-package/morie
          extra-packages: any::testthat any::survey any::DBI any::RSQLite any::jsonlite
          needs: check

      - name: Install morie
        run: R CMD INSTALL r-package/morie

      - name: Test
        run: Rscript -e "library(morie); testthat::test_dir('r-package/morie/tests/testthat')"
