name: CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "src/moirais/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "src/moirais/**"
      - ".github/workflows/ci.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    
jobs:
  test-python:
    name: Python ${{ matrix.python-version }} / ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gfortran libopenblas-dev pkg-config
        shell: bash

      - name: Install
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -e ".[test,interactive]"

      - name: Test
        run: pytest -q --tb=short

  test-r:
    name: R tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R deps
                run: Rscript -e "install.packages(c('testthat','survey','DBI','RSQLite','jsonlite'), repos='https://cloud.r-project.org/', quiet=TRUE)"

      - name: Install moirais
                run: R CMD INSTALL libexec/config/tools/r-package/moirais

      - name: Test
                run: Rscript -e "library(moirais); testthat::test_dir('libexec/config/tools/r-package/moirais/tests/testthat')"

  docker:
    name: Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: moirais:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: docker run --rm moirais:ci python3 -m moirais.runner list-modules

      - name: Health check
        run: docker run --rm moirais:ci python3 -c "from moirais.fn._registry import REGISTRY; n=len(REGISTRY); assert n > 5500, 'Only %d entries' % n; print('Registry OK:', n, 'entries')"

      - name: Security audit
        run: |
          docker run --rm moirais:ci whoami | grep -q moiraisapp && echo "Non-root user OK" || exit 1
          docker inspect moirais:ci --format json | grep -q Healthcheck && echo "Healthcheck OK" || exit 1

      - name: Push to GHCR
        if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
