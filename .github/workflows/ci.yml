name: CI

# Triggers only on push to main (admin-merge already short-circuits PR review).
# Path-restricted so docs-only / paper-only / sibling-workflow-only commits
# don't fire a 5-10 min Python+R test cycle.

on:
  push:
    branches: ["main"]
    paths:
      - "src/morie/**"
      - "tests/**"
      - "r-package/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test-python:
    name: Python ${{ matrix.python-version }} / ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system build deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: gfortran libopenblas-dev pkg-config
          version: 1.0

      - name: Install
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -e ".[test,interactive]"

      - name: Test
        run: pytest -q --tb=short

  test-r:
    name: R tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      # setup-r-dependencies@v2 installs DESCRIPTION's Imports/Suggests
      # AND any extra-packages list, into the right user library so
      # later library() / Rscript calls find them.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-package/morie
          extra-packages: any::testthat any::survey any::DBI any::RSQLite any::jsonlite
          needs: check

      - name: Install morie
        run: R CMD INSTALL r-package/morie

      - name: Test
        run: Rscript -e "library(morie); testthat::test_dir('r-package/morie/tests/testthat')"
