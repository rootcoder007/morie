name: CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "src/moirais/**"
      - "r-package/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main", "dev"]
    paths:
      - "src/moirais/**"
      - "r-package/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  test-python:
    name: Python ${{ matrix.python-version }} / ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gfortran libopenblas-dev pkg-config

      - name: Install
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --prefer-binary -e ".[test,interactive]"

      - name: Test
        run: pytest -q --tb=short

  test-r:
    name: R tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R deps
        run: Rscript -e "install.packages(c('testthat','survey','DBI','RSQLite','jsonlite'), repos='https://cloud.r-project.org/', quiet=TRUE)"

      - name: Install moirais
        run: R CMD INSTALL r-package/moirais

      - name: Test
        run: Rscript -e "library(moirais); testthat::test_dir('r-package/moirais/tests/testthat')"
