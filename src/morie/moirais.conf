# morie.conf — MORIE configuration
# Edit this file to customize your MORIE environment.
# Reload: restart the TUI or run `morie doctor`
#
# This file is read at startup. Lines starting with # are comments.
# Format: KEY = VALUE

# ─── LLM Provider ──────────────────────────────────────────────────
# Provider priority: ollama → freeapi → gemini → api → openai → local
# Override with explicit provider:
#   MORIE_LLM_PROVIDER = ollama

# Local Ollama (private, fast)
OLLAMA_BASE_URL = http://localhost:11434
# MORIE_OLLAMA_MODEL =       # Auto-detected (prefers morie:*, largest first)
OLLAMA_KV_CACHE_TYPE = q8_0  # KV-cache compression (q8_0 or q4_0)
OLLAMA_FLASH_ATTENTION = 1   # Flash attention for memory efficiency

# OllamaFreeAPI (free, no key needed)
# moriefam = mistral-nemo:custom
# Available: gpt-oss:20b, deepseek-r1:latest, llama3.2:3b, qwen2.5:7b

# Gemini (free tier)
# GEMINI_API_KEY =
# GEMINI_MODEL = gemini-2.0-flash

# Generic OpenAI-compatible API
# LLM_API_BASE_URL =
# LLM_API_KEY =

# OpenAI
# OPENAI_API_KEY =

# ─── LLM Behavior ──────────────────────────────────────────────────
MORIE_LLM_TEMPERATURE = 0.1
MORIE_LLM_NUM_PREDICT = 4096
MORIE_LLM_CHUNK_TIMEOUT = 90

# ─── Emissions Tracking ────────────────────────────────────────────
MORIE_EMISSIONS_ENABLED = true
MORIE_EMISSIONS_OUTPUT = data/cache/morie_emissions.csv
# MORIE_COUNTRY_ISO = CA
# MORIE_REGION = ON

# ─── Data ───────────────────────────────────────────────────────────
MORIE_DB_PATH = data/cache/morie.db
MORIE_DEFAULT_DATASET = ocp21

# ─── TUI ────────────────────────────────────────────────────────────
MORIE_THEME = dark
# MORIE_EDITOR = nano
# MORIE_PAGER = less

# ─── REPL ───────────────────────────────────────────────────────────
MORIE_REPL_MODE = python
# Options: python, r, shell, polyglot
MORIE_REPL_HISTORY_SIZE = 1000

# ─── Keybindings (TUI) ─────────────────────────────────────────────
# Screen keys (from HomeScreen):
#   c = Chat       p = Pipeline    d = Doctor
#   i = Datasets   h = Help        s = Stats
#   e = REPL       b = Debug       q = Quit
#
# Copy (any screen):
#   ctrl+o = Copy all     ctrl+b = Copy errors
#   ctrl+l = Copy last 5  F2 = Select mode
#
# REPL prefixes:
#   ? = LLM query    ! = Shell command    R> = R code

# ─── Pipeline ───────────────────────────────────────────────────────
MORIE_PIPELINE_CARBON = true
MORIE_PIPELINE_OUTPUT_DIR = data/manifest/outputs

# ─── TurboQuant ─────────────────────────────────────────────────────
MORIE_QUANT_BITS = 3
MORIE_QUANT_METHOD = mse
# Options: mse (Stage 1 only), prod (Stage 1 + QJL error correction)
