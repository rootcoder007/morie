# moirais.conf — MOIRAIS configuration
# Edit this file to customize your MOIRAIS environment.
# Reload: restart the TUI or run `moirais doctor`
#
# This file is read at startup. Lines starting with # are comments.
# Format: KEY = VALUE

# ─── LLM Provider ──────────────────────────────────────────────────
# Provider priority: ollama → freeapi → gemini → api → openai → local
# Override with explicit provider:
#   MOIRAIS_LLM_PROVIDER = ollama

# Local Ollama (private, fast)
OLLAMA_BASE_URL = http://localhost:11434
# MOIRAIS_OLLAMA_MODEL =       # Auto-detected (prefers moirais:*, largest first)
OLLAMA_KV_CACHE_TYPE = q8_0  # KV-cache compression (q8_0 or q4_0)
OLLAMA_FLASH_ATTENTION = 1   # Flash attention for memory efficiency

# OllamaFreeAPI (free, no key needed)
# moiraisfam = mistral-nemo:custom
# Available: gpt-oss:20b, deepseek-r1:latest, llama3.2:3b, qwen2.5:7b

# Gemini (free tier)
# GEMINI_API_KEY =
# GEMINI_MODEL = gemini-2.0-flash

# Generic OpenAI-compatible API
# LLM_API_BASE_URL =
# LLM_API_KEY =

# OpenAI
# OPENAI_API_KEY =

# ─── LLM Behavior ──────────────────────────────────────────────────
MOIRAIS_LLM_TEMPERATURE = 0.1
MOIRAIS_LLM_NUM_PREDICT = 4096
MOIRAIS_LLM_CHUNK_TIMEOUT = 90

# ─── Emissions Tracking ────────────────────────────────────────────
MOIRAIS_EMISSIONS_ENABLED = true
MOIRAIS_EMISSIONS_OUTPUT = data/cache/moirais_emissions.csv
# MOIRAIS_COUNTRY_ISO = CA
# MOIRAIS_REGION = ON

# ─── Data ───────────────────────────────────────────────────────────
MOIRAIS_DB_PATH = data/cache/moirais.db
MOIRAIS_DEFAULT_DATASET = ocp21

# ─── TUI ────────────────────────────────────────────────────────────
MOIRAIS_THEME = dark
# MOIRAIS_EDITOR = nano
# MOIRAIS_PAGER = less

# ─── REPL ───────────────────────────────────────────────────────────
MOIRAIS_REPL_MODE = python
# Options: python, r, shell, polyglot
MOIRAIS_REPL_HISTORY_SIZE = 1000

# ─── Keybindings (TUI) ─────────────────────────────────────────────
# Screen keys (from HomeScreen):
#   c = Chat       p = Pipeline    d = Doctor
#   i = Datasets   h = Help        s = Stats
#   e = REPL       b = Debug       q = Quit
#
# Copy (any screen):
#   ctrl+o = Copy all     ctrl+b = Copy errors
#   ctrl+l = Copy last 5  F2 = Select mode
#
# REPL prefixes:
#   ? = LLM query    ! = Shell command    R> = R code

# ─── Pipeline ───────────────────────────────────────────────────────
MOIRAIS_PIPELINE_CARBON = true
MOIRAIS_PIPELINE_OUTPUT_DIR = data/manifest/outputs

# ─── TurboQuant ─────────────────────────────────────────────────────
MOIRAIS_QUANT_BITS = 3
MOIRAIS_QUANT_METHOD = mse
# Options: mse (Stage 1 only), prod (Stage 1 + QJL error correction)
